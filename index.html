<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Gradient Background</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #09070f;
    }

    body {
      position: relative;
    }

    .bg-wrap {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 30%, rgba(100, 87, 133, 0.55), transparent 35%),
        radial-gradient(circle at 80% 25%, rgba(19, 3, 56, 0.85), transparent 32%),
        radial-gradient(circle at 55% 75%, rgba(14, 9, 27, 0.95), transparent 38%),
        linear-gradient(135deg, #09070f 0%, #130338 45%, #0e091b 100%);
      filter: contrast(1.08) saturate(1.05);
    }

    .blob {
      position: absolute;
      width: 55vw;
      height: 55vw;
      max-width: 900px;
      max-height: 900px;
      min-width: 420px;
      min-height: 420px;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.65;
      mix-blend-mode: screen;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
      animation-direction: alternate;
    }

    .blob-1 {
      background: #130338;
      top: -10%;
      left: -8%;
      animation: move1 16s infinite;
    }

    .blob-2 {
      background: #645785;
      top: 10%;
      right: -10%;
      animation: move2 18s infinite;
    }

    .blob-3 {
      background: #0e091b;
      bottom: -18%;
      left: 20%;
      animation: move3 20s infinite;
    }

    .grain {
      position: absolute;
      inset: -200%;
      background-image:
        repeating-radial-gradient(circle at 0 0, rgba(255,255,255,0.035) 0 1px, transparent 1px 4px);
      opacity: 0.08;
      mix-blend-mode: soft-light;
      animation: grainMove 8s steps(8) infinite;
      transform: rotate(8deg);
    }

    @keyframes move1 {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(12%, 8%) scale(1.12); }
    }

    @keyframes move2 {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-14%, 10%) scale(1.08); }
    }

    @keyframes move3 {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(10%, -12%) scale(1.15); }
    }

    @keyframes grainMove {
      0%   { transform: translate(0, 0) rotate(8deg); }
      25%  { transform: translate(2%, -3%) rotate(8deg); }
      50%  { transform: translate(-2%, 2%) rotate(8deg); }
      75%  { transform: translate(3%, 1%) rotate(8deg); }
      100% { transform: translate(-1%, -2%) rotate(8deg); }
    }
  </style>
</head>
<body>
  <div class="bg-wrap">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="grain"></div>
  </div>
</body>
</html>
