<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Grainient</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
    }

    #app {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import React from "https://esm.sh/react";
    import ReactDOM from "https://esm.sh/react-dom/client";
    import Grainient from "https://esm.sh/reactbits@latest/backgrounds/Grainient";

    const root = ReactDOM.createRoot(document.getElementById("app"));

    root.render(
      React.createElement(Grainient, {
        color1: "#130338",
        color2: "#645785",
        color3: "#0e091b",
        timeSpeed: 0.4,
        zoom: 1.4,
        grainAmount: 0.05,
        contrast: 1.2
      })
    );
  </script>
</body>
</html>
